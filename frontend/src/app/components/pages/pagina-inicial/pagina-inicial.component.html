<!-- pagina-inicial.component.html -->
<div class="main">
  <header></header>

  <div *ngIf="paginaAtual == 'home'">Home</div>
  <div *ngIf="paginaAtual == 'pedido'">Pedido</div>
  <div *ngIf="paginaAtual == 'historico'">Historico</div>
  <div *ngIf="paginaAtual == 'empregado'">empregado</div>
  <!-- Utilize [ ] para passar o valor da variável -->
  <app-navigation-bar
    [paginaAtual]="paginaAtual"
    (paginaAtualChange)="paginaAtual = $event"
  ></app-navigation-bar>
</div>
